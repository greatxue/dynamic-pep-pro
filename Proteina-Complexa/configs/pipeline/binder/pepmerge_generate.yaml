# PepMerge Peptide Generation Sub-Config
# 用于在给定受体上生成短肽 binder
#
# 注意：本文件是 generation 子配置，不能直接运行。
# 使用方法（在项目根目录）：
#   python src/proteinfoundation/generate.py \
#     --config-name search_pepmerge_local_pipeline \
#     ++generation.dataloader.dataset.conditional_features.0.pdb_path=./path/to/receptor.pdb \
#     ++generation.dataloader.dataset.conditional_features.0.input_spec="B"
# 或直接编辑 configs/search_pepmerge_local_pipeline.yaml 中的路径再运行。

defaults:
  - /pipeline/base_gen_data@_here_
  - /pipeline/model_sampling@_here_
  - _self_

# =============================================================================
# Target and dataloader
# =============================================================================
dataloader:
  batch_size: 8

  dataset:
    # [TODO] 肽链长度范围，根据目标受体调整
    nres:
      _target_: proteinfoundation.datasets.gen_dataset.UniformInt
      low: 8     # 最短肽链长度
      high: 20   # 最长肽链长度
      nsamples: 5
      endpoint: true

    nrepeat_per_sample: 4  # 每个长度重复生成次数

    conditional_features:
      - _target_: proteinfoundation.datasets.gen_dataset.TargetFeatures
        task_name: pepmerge_target
        binder_gen_only: True   # True = 只生成 binder，不生成 target

        # [TODO] 改为你的受体 PDB 路径（只包含受体链，不包含肽链）
        pdb_path: ./assets/target_data/receptor.pdb

        # [TODO] 改为受体链的 chain ID 和残基范围
        # 例如: "B" 表示整个 B 链，"B1-200" 表示 B 链第 1-200 残基
        input_spec: "B"

        # [TODO] 热点残基（可选），格式如 ["B45", "B67"]，无热点留空列表
        target_hotspots: []

        binder_center: null
        pdb_id: null

    transforms:
      - _target_: proteinfoundation.datasets.transforms.CoordsTensorCenteringTransform
        tensor_name: "x_target"
        mask_name: "target_mask"
        data_mode: "all-atom"

# =============================================================================
# Search algorithm
# =============================================================================
search:
  algorithm: single-pass  # 无 reward model 时用 single-pass，无需排序
  max_batch_size: ${..dataloader.batch_size}
  reward_threshold: null

  step_checkpoints: [0, 100, 200, 300, 400]

  best_of_n:
    replicas: 2

  beam_search:
    n_branch: 4
    beam_width: 4
    keep_lookahead_samples: true
    save_intermediate_states: false

  fk_steering:
    n_branch: 4
    beam_width: 4
    temperature: 0.1
    keep_lookahead_samples: true

  mcts:
    n_simulations: 20
    exploration_prob: 0.5
    exploration_constant: 1.0
    keep_lookahead_samples: true

# =============================================================================
# Refinement（暂时关闭，避免依赖 AF2）
# =============================================================================
refinement:
  algorithm: null
  refine_targets: final
  save_pre_refinement: none

# =============================================================================
# Post-generation filtering
# =============================================================================
filter:
  filter_samples_limit: 100
  delete_non_top_n_samples: false
  dedup_sequence: true
  reward_threshold: null

# =============================================================================
# Reward model（暂时只用长度/结构过滤，不跑 AF2）
# 如需 AF2 打分，参考 binder_generate.yaml 中 af2folding 部分
# =============================================================================
reward_model:
  _target_: "proteinfoundation.rewards.base_reward.CompositeRewardModel"
  reward_models: {}
